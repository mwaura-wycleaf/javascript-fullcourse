<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>The let and const keywords create variables</p>
    <p id="demo"></p>
    <script>
      let age = 5;
      let firstName = "James";
    
      document.getElementById("demo").innerHTML = firstName + " is " + age + " years old";
    </script>
</body>
</html>
