<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="demo"></p>
    <p id="demo-1"></p>
    <p id="demo-2"></p>
    <p id="demo-3"></p>
    <p id="demo-4"></p>
    <script>
        //For loop
        const cars = ["BMW", "Volvo", "Saab", "Ford"];
        let len = cars.length;
        let text = "";

        for(let i = 0; i < len; i++){
            text += cars[i] + "<br>";
        }

        document.getElementById("demo").innerHTML = text;

        //while loop
        let $text = "";

        let $i = 0;
        while ($i < 10){
            $text += "The number is " + $i + "<br>";
            $i++;
        }

        document.getElementById("demo-1").innerHTML = $text;

        //do...while loop
        let _text = "";
        let _i = 0;

        do {
            _text += "<br>The number is " + _i;
            _i++;
        }
        while(_i <= 10);

        document.getElementById("demo-2").innerHTML = _text;

        //break statement
        let texty = "";

        for (let index = 0; index < 10; index++){
            if (index === 3){break;}
            texty += "<br>The number is " + index;
        }

        document.getElementById("demo-3").innerHTML = texty;

        //continue statement
        let _texty = "";

        for (let _index = 0; _index < 10; _index++){
            if (_index === 3){continue;}
            _texty += "<br>The number is " + _index;
        }

        document.getElementById("demo-4").innerHTML = _texty;
    </script>
</body>
</html>
