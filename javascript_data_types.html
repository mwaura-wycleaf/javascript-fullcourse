<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
     //string data type
     let name = "Sam Milby";

     //number data type
     let age = 40;

     //boolean data type
     let isStudent = true;
        
     //object data type
     let person = {
         name: "Sam Milby",
         age: 40,
         isStudent: true
     };
     
     //array data type
     let hobbies = ["reading", "swimming", "coding"];
        
     //undefined data type
     let address;
    
     //null data type
     let job = null;

     //BigInt data type
     let bigIntNumber = 1234567890123456789012345678901234567890n;
     let anotherBigInt = BigInt("1234567890123456789012345678901234567890");

        console.log(typeof name); // Output: string
        console.log(typeof age); // Output: number
        console.log(typeof isStudent); // Output: boolean
        console.log(typeof person); // Output: object
        console.log(typeof hobbies); // Output: object
        console.log(typeof address); // Output: undefined
        console.log(typeof job); // Output: object
        console.log(typeof bigIntNumber); // Output: bigint
        console.log(typeof anotherBigInt); // Output: bigint
        console.log(typeof NaN);
    </script>
</body>
</html>
