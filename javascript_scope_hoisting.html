<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="demo"></p>
    <script>
        //Global scope
        let carName = "volvo";
        myCar();

        function myCar() {
        document.getElementById("demo").innerHTML = carName;
        }

        //function scope
        function myCar2() {
            let $carName = "mazda";//function scope
        }

        //Block scope
        {
            let car3 = "AMG"
        }

        /*
        In block scope let cannot be used outside the block but variable can be used
        In function scope a variable cannot be accessed outside it
        for global scope it can be accessed from anywhere
        */
    </script>
</body>
</html>
