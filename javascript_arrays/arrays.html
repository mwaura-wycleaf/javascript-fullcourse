<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>An array is an object type designed for storing data collections </p>
    <p id="demo"></p>
    <p id="demo1"></p>
    <p id="demo2"></p>
    <script>
        //My first Array
        const cars = ["Saab","volvo", "BMW"];
        console.log(cars, typeof cars);
        document.getElementById("demo").innerHTML = cars;

        //Accessing array

        let car = cars[0];
        console.log(car);

        //Changing array elements/ reasssigning

        cars[0] = "Lexus";
        console.log(cars);

        //Array methods
        //array length
        document.getElementById("demo1").innerHTML = cars.length;

        //The toString() method
        document.getElementById("demo2").innerHTML = cars.toString();
    </script> 
</body>
</html>
