<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="demo"></p>
    <p id="demo1"></p>
    <script>
        const theDate = new Date();
        document.querySelector("#demo").innerHTML = theDate;

        const anotherDate = new Date("2022-03-25");
        document.querySelector("#demo1").innerHTML = anotherDate;

    </script>
</body>
</html>
