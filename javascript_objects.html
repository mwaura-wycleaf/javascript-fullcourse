<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="demo">
    <p id="demo1">
    <p id="demo2">
    <p id="demo3">
    <p id="demo4">
    <p id="demo5">
    <p id="demo6">
    <p id="demo7">
    <p id="demo8">
    <script>
        //person object with three properties
        const person = {
            firstName: "Wycliff",
            secondName: "Ng'ang'a",
            age: "17"
        }

        let details = `I am ${person.firstName} ${person.secondName} and i am ${person.age} years old`
        console.log(details);
        let details_bracketnotation = ` I am ${person["firstName"]} ${person["secondName"]} and i am ${person["age"]} years old`
        console.log(details_bracketnotation)

        document.querySelector("#demo").innerHTML = details;
        document.querySelector("#demo1").innerHTML = details_bracketnotation;

        //Changing object properties
        person.age = 18;
        

        //Adding new properties
        person.location = "USA";

        document.querySelector("#demo2").innerHTML = `I will be turning ${person.age} next year in the ${person["location"]}`;

        //Deleting a property

        delete person.secondName;

        console.log(person);
        
        //check if a property exists...it returns true or false
        let presence = ("firstName" in person)
        document.getElementById("demo3").innerHTML = presence;

        //Nested objects
        const myObj = {
            name : "John",
            age :30,
            myCars: {
                car1:"Ford"
            }
        }

        //Accessing nested objects
        let nestedObj = myObj.myCars.car1;
        document.querySelector("#demo4").innerHTML = nestedObj;

        //Javasript object methods
        //Addition of methods is the same as adding the usual properties
        const $person = {
            firstName: "James",
            lastName: "Egeza",
            age: 50,
            fullName: function() {
                return this.firstName + " " + this.lastName;
            }
        };

        document.querySelector("#demo5").innerHTML =  $person.fullName();

        //The this keyword

        const person1 = {
            name: 'Sam',
            hello: function () {
                return "Hello " + this.name;
            }
        };

        const person2 = {
            name: 'Pam',
            hello: function () {
                return "Hello " + this.name;
            }
        };
         
        document.getElementById("demo6").innerHTML = person2.hello() + "<br><br>" + person1.hello();

        //Displaying object properties
        document.getElementById("demo7").innerHTML = person;

        //using for...in loop
        let text = "";
        for (let item in person){
            text += person[item] + " ";
        };

        document.getElementById("demo8").innerHTML = text;

    </script>
</body>
</html>
