<html lang="en">
<head>

<body>
    <p id="demo"></p>
    <p id="demo1"></p>
   
    <script>
        let x = 123; //number without decimals
        let y = 3.149; //number with decimals
        let z = 123e5; //12300000
        let b = 123e-5 //0.00123
        let n = 999999999999999; //999999999999999
        let n1 = 99999999999999999 //100000000000000000

        //Number methods
           //toString method
           let stringResult =x.toString();
           document.querySelector("#demo").innerHTML = stringResult;
           
           //converting to a different base
           let base2 = x.toString(2);
           document.querySelector("#demo1").innerHTML = base2;
    </script>
</body>
