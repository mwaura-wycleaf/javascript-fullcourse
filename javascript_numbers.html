<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="demo"></p>
    <p id="demo1"></p>
    <p id="demo2"></p>
    <p id="demo3"></p>
    <p id="demo4"></p>
    <script>
        let x = 123; //number without decimals
        let y = 3.149; //number with decimals
        let z = 123e5; //12300000
        let b = 123e-5 //0.00123
        let n = 999999999999999; //999999999999999
        let n1 = 99999999999999999 //100000000000000000

        //Number methods
           //toString method
           let stringResult =x.toString();
           document.querySelector("#demo").innerHTML = stringResult;
           
           //converting to a different base
           let base2 = x.toString(2);
           document.querySelector("#demo1").innerHTML = base2;

           //toExponential method
           let exp1 = y.toExponential(2);
           let exp2 = y.toExponential(3);
           let exp3 = y.toExponential(4);
           document.querySelector("#demo2").innerHTML = exp1 +"<br>"+exp2 +"<br>" +exp3;

           //toFixed method
           document.getElementById("demo3").innerHTML = y.toFixed() + "<br>" + y.toFixed(2) + "<br>" + y.toFixed(4)

           //toPrecision method
             document.getElementById("demo4").innerHTML = y.toPrecision() + "<br>" + y.toPrecision(2) + "<br>" + y.toPrecision(4)

             //value of method
            document.getElementById("demo5").innerHTML = x.valueOf() + "<br>" + (123).valueOf() + "<br>" + (100 + 23).valueOf();1

            //the number method...used to convert JS variables to numbers
            document.getElementById("demo6").innerHTML = Number("John") + "<br>" + Number("10") + "<br>" + Number(new Date("1970-01-01"));
    </script>
</body>
</html>
